<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Something Went Wrong — LetItRip</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:#f9fafb;color:#111827;padding:1.5rem;
    }
    @media(prefers-color-scheme:dark){
      body{background:#111827;color:#f9fafb}
      .card{background:#1f2937;border-color:#374151}
      .desc{color:#9ca3af}
      .detail-box{background:rgba(239,68,68,.1);border-color:#7f1d1d}
      .detail-text{color:#fca5a5}
      .btn-primary{background:#4f46e5}
      .btn-primary:hover{background:#4338ca}
      .btn-outline{border-color:#6366f1;color:#818cf8}
      .btn-outline:hover{background:rgba(99,102,241,.1)}
    }
    .card{
      max-width:540px;width:100%;text-align:center;
      background:#fff;border:1px solid #e5e7eb;border-radius:1rem;
      padding:2.5rem 2rem;
    }
    .icon-wrap{
      width:5rem;height:5rem;margin:0 auto 1.5rem;
      background:#fef2f2;border-radius:50%;display:flex;
      align-items:center;justify-content:center;
    }
    @media(prefers-color-scheme:dark){.icon-wrap{background:rgba(239,68,68,.15)}}
    .icon-wrap svg{width:2.5rem;height:2.5rem;color:#ef4444}
    h1{font-size:1.5rem;font-weight:700;margin-bottom:.75rem}
    .desc{color:#6b7280;font-size:.95rem;line-height:1.6;margin-bottom:1.5rem}
    .detail-box{
      background:#fef2f2;border:1px solid #fecaca;border-radius:.5rem;
      padding:.75rem 1rem;margin-bottom:1.5rem;text-align:left;
      display:none;
    }
    .detail-box.visible{display:block}
    .detail-text{font-family:ui-monospace,SFMono-Regular,'SF Mono',Menlo,monospace;font-size:.8rem;color:#991b1b;word-break:break-all}
    .actions{display:flex;flex-direction:column;gap:.75rem}
    @media(min-width:480px){.actions{flex-direction:row;justify-content:center}}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;
      padding:.75rem 1.5rem;border-radius:.5rem;font-size:.95rem;font-weight:600;
      cursor:pointer;text-decoration:none;min-width:160px;
      transition:background .15s,border-color .15s;border:2px solid transparent;
    }
    .btn-primary{background:#4f46e5;color:#fff}
    .btn-primary:hover{background:#4338ca}
    .btn-outline{background:transparent;border-color:#4f46e5;color:#4f46e5}
    .btn-outline:hover{background:rgba(79,70,229,.06)}
  </style>
</head>
<body>
  <div class="card">
    <!-- Warning icon -->
    <div class="icon-wrap">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
      </svg>
    </div>

    <h1>Something Went Wrong</h1>
    <p class="desc">
      We hit an unexpected problem while loading the page.
      Please try again — if the issue persists, try clearing your browser cookies or
      contact support.
    </p>

    <!-- Shows the originating path from the ?from= query param (dev aid) -->
    <div class="detail-box" id="detail">
      <p class="detail-text" id="detail-text"></p>
    </div>

    <div class="actions">
      <button class="btn btn-primary" onclick="window.location.reload()">Try Again</button>
      <a class="btn btn-outline" href="/">Go Home</a>
    </div>
  </div>

  <script>
    // Show contextual info from the ?from= query parameter (non-sensitive path only)
    (function(){
      try {
        var params = new URLSearchParams(window.location.search);
        var from = params.get('from');
        if (from) {
          document.getElementById('detail').classList.add('visible');
          document.getElementById('detail-text').textContent = 'Failed while loading: ' + from;
        }
      } catch(_){}
    })();
  </script>
</body>
</html>
